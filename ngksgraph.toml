[qt]
enabled = false
qt_root = ""
prefix = ""
version = 6
modules = []
moc_path = ""
uic_path = ""
rcc_path = ""
include_dirs = []
lib_dirs = []
libs = []

[ai]
enabled = false
plugin = ""
mode = "advise"
max_actions = 3
log_tail_lines = 200
redact_paths = true
redact_env = true

[ai.provider]
model = ""
endpoint = ""
api_key_env = ""
